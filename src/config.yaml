site:
  name: DHInfra.at
  site: 'https://www.dhinfra.at'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: DHInfra.at — Digital Humanities Infrastructure in Austria
    template: '%s — DHInfra.at'
  description: 'DHInfra.at is a CLARIAH-AT initiative providing shared Digital Humanities infrastructure across Austria: GPU/LLM compute, digitization, development services, and open-source software.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: DHInfra.at
    images:
      - url: '~/assets/images/dhinfra-og.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'use-cases' # Blog main path; was "blog" in the old site (redirect /blog -> /use-cases)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'light' # Default to light (matches the old site's blue look); toggle still available. Values: "system" | "light" | "dark" | "light:only" | "dark:only"
